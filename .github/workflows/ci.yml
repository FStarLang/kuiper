name: Test build

on:
  push:
    branches-ignore:
    - _**
  pull_request:
  workflow_dispatch:
    inputs:
      debug:
        description: Enable debug output
        type: boolean
        default: false
      nocache:
        description: Do not use stored cache
        type: boolean
        default: false

# When updating this tag, also update .devcontainer/devcontainer.json
# and advance.yml.
jobs:
  verify:
    runs-on: [self-hosted, linux, X64, cuda]
    container:
      image: mtzguido/pulse-cuda-devcontainer:latest
      options: --gpus all
    defaults:
      run:
        shell: bash
    steps:
      - run: |
          whoami
          id
          env

      - run: find . -delete
      - name: Check out repo
        uses: actions/checkout@v6

      # Fixup HOME (https://github.com/actions/runner/issues/863)
      - name: Setup HOME
        run: |
          echo "HOME=/home/vscode" >> $GITHUB_ENV
          echo "PATH=/usr/local/bin/:$PATH" >> $GITHUB_ENV

      # FIXME: env or path gets broken
      # - uses: mtzguido/set-opam-env@master

      - run: sudo apt-get install -y indent

      - name: Get submodules
        run: |
          git submodule update --depth 1 --init --recursive

      - name: Check CUDA
        run: ./scripts/check-cuda.sh

      - name: Install Z3 4.16.0
        run: |
          wget -nv https://github.com/Z3Prover/z3/releases/download/z3-4.16.0/z3-4.16.0-x64-glibc-2.39.zip
          unzip z3-4.16.0-x64-glibc-2.39.zip
          sudo cp z3-4.16.0-x64-glibc-2.39/bin/z3 /usr/local/bin/z3-4.16.0
          rm -r z3-4.16.0-*

      - name: Set debug mode
        if: ${{ inputs.debug }}
        run: |
          echo "V=1" >>$GITHUB_ENV
          echo "OTHERFLAGS=-d" >>$GITHUB_ENV

      - name: read F* commit
        id: fstarcommit
        run: |
          cd FStar
          C=$(git rev-parse HEAD)
          echo "FSTARCOMMIT=$C" >>"$GITHUB_OUTPUT"

      - name: Try fetch cached F*
        id: fstarcache
        if: ${{ inputs.nocache != true && github.event_name != 'schedule' }}
        uses: actions/cache/restore@v5
        with:
          path: inst
          key: fstar-${{ runner.os }}-${{ runner.arch }}-${{steps.fstarcommit.outputs.FSTARCOMMIT}}

      - name: Fake F* touchfile
        if: ${{ steps.fstarcache.outputs.cache-hit == 'true' }}
        run: |
          touch .fstar.src.touch
          touch .fstar.touch

      - name: Build F*
        if: ${{ steps.fstarcache.outputs.cache-hit != 'true' }}
        run: |
          eval $(opam env)
          make -j$(nproc) -f verify.mk .fstar.touch

      - name: Save F*
        uses: actions/cache/save@v5
        if: ${{ steps.fstarcache.outputs.cache-hit != 'true' }}
        with:
          path: inst
          key: fstar-${{ runner.os }}-${{ runner.arch }}-${{steps.fstarcommit.outputs.FSTARCOMMIT}}

      - name: Verify and extract
        run: |
          eval $(opam env)
          make -kj$(nproc) -Otarget -f verify.mk all

      - name: Make bench-package
        run: |
          eval $(opam env)
          make -kj$(nproc) -Otarget bench-package

      - name: Upload bench-package
        uses: actions/upload-artifact@v6
        with:
          name: kuiper-bench
          path: kuiper-bench.tar.gz

      - name: Upload CUDA output
        if: ${{ always () }}
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: output
          path: |
            obj/*.cu
            obj/*.h

      - name: Spit out all CUDA files into action log
        if: ${{ always () }}
        run: |
          for i in obj/*.cu; do
            echo "::group::$i"
            cat "$i"
            echo "::endgroup::"
          done || true

      - name: Upload failed state
        if: ${{ always () && inputs.debug }}
        uses: actions/upload-artifact@v6
        continue-on-error: true
        with:
          name: all
          include-hidden-files: true
          path: '**'

  test-and-bench:
    needs: verify
    runs-on: [self-hosted, linux, X64, cuda]
    container:
      image: mtzguido/pulse-cuda-devcontainer:latest
      options: --gpus all
    defaults:
      run:
        shell: bash
    steps:
      - run: find . -delete

      - name: Check out repo
        uses: actions/checkout@v6

      - name: Download bench-package
        uses: actions/download-artifact@v7
        with:
          name: kuiper-bench

      - run: tar xzf kuiper-bench.tar.gz

      - name: Build and test
        working-directory: kuiper-bench
        run: |
          make -kj$(nproc) -Otarget

  check-dist:
    needs: verify
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - run: find . -delete

      - name: Check out repo
        uses: actions/checkout@v6

      - name: Download CUDA output
        uses: actions/download-artifact@v7
        with:
          name: output
          path: obj

      - name: Check dist/ is up to date
        run: |
          # Ignore the BUILD_INFO metadata file
          diff_output=$(diff -ru --exclude=BUILD_INFO dist/ obj/ 2>&1) || true
          if [ -n "$diff_output" ]; then
            echo "::warning::dist/ is out of date. Run 'make dist' and commit the changes."
            echo "$diff_output" | head -100
          else
            echo "dist/ is up to date."
          fi
