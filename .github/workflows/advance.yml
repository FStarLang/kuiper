name: Advance submodules

on:
  # Manually triggered
  workflow_dispatch:
  schedule:
    # Or once a day
    - cron: '0 0 * * *'

# When updating this tag, also update .devcontainer/devcontainer.json
# and ci.yml.
jobs:
  build:
    runs-on: [self-hosted, linux, X64, cuda]
    container:
      image: mtzguido/pulse-cuda-devcontainer:latest
      options: --gpus all
    defaults:
      run:
        shell: bash
    steps:
      - run: find . -delete
      - name: Check out repo
        uses: actions/checkout@v4

      - run: sudo apt-get install -y indent

      - name: Setup HOME and PATH
        run: |
          echo "HOME=/home/vscode" >> $GITHUB_ENV
          echo "PATH=/home/vscode/bin:$PATH" >> $GITHUB_ENV

      - name: Configure git
        run: |
          git config --global user.name "Actions bot"
          git config --global user.email "none@none"

      - name: Get submodules
        run: |
          git submodule init
          git submodule update

      - run: |
          ./try-rebase.sh
          if ! git diff --quiet; then
            echo MOVED=1 >>$GITHUB_ENV
          else
            echo MOVED=0 >>$GITHUB_ENV
          fi

      - name: Test the build
        if: ${{ env.MOVED == '1' }}
        run: |
          eval $(opam env)
          make -skj$(nproc) ci
          make -skj$(nproc) dist
          # Did something change?
          git add dist # must rest!
          git reset dist/BUILD_INFO # ignore build info changes
          if ! git diff --quiet --cached dist; then
            echo DISTCHANGE=1 >>$GITHUB_ENV
            git add dist/BUILD_INFO # but commit them if we're updating...
          else
            echo DISTCHANGE=0 >>$GITHUB_ENV
          fi
          git reset

      - name: Push updated state, since there's no diff
        if: ${{ env.MOVED == '1' && env.DISTCHANGE == '0' }}
        run: |
          # Use the token so we can push to these repos.
          for dir in FStar karamel; do
            pushd $dir
            echo "in $(pwd)"
            R=$(git remote get-url origin | grep -Eo '[[:alnum:]]*/[[:alnum:]]*$')
            echo R=$R
            echo before
            git remote -v
            git remote set-url origin https://${{secrets.KUIPER_ADVANCE_GH_TOKEN}}@github.com/$R
            echo after
            git remote -v
            popd
          done
          ./try-push.sh

      - name: Push submodule commits to remotes and open PR
        if: ${{ env.MOVED == '1' && env.DISTCHANGE == '1' }}
        run: |
          # Push submodule commits so the SHAs are reachable when the PR is merged.
          for dir in FStar karamel; do
            pushd $dir
            R=$(git remote get-url origin | grep -Eo '[[:alnum:]]*/[[:alnum:]]*$')
            git remote set-url origin https://${{ secrets.KUIPER_ADVANCE_GH_TOKEN }}@github.com/$R
            git push -f origin HEAD:refs/heads/advance/kuiper
            popd
          done

          # Create a branch with the submodule bump + dist changes.
          BRANCH=advance/dist-update
          git checkout -b "$BRANCH"
          git add .
          git commit -m "Bump submodules (dist changed)"
          git push -f origin "$BRANCH"

          # Create a new PR or update the existing one.
          existing_pr=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing_pr" ]; then
            echo "Updated existing PR #$existing_pr"
          else
            gh pr create \
              --title "Advance submodules (dist changed)" \
              --body "Automated submodule advance detected changes in \`dist/\`. Please review."
          fi
