name: Advance submodules

on:
  # Manually triggered
  workflow_dispatch:
  schedule:
    # Or once a day
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: [self-hosted, linux, X64, cuda]
    container:
      image: mtzguido/pulse-cuda-devcontainer
      options: --gpus all
    defaults:
      run:
        shell: bash
    steps:
      - run: find . -delete
      - name: Check out repo
        uses: actions/checkout@v4

      - run: sudo apt-get install -y indent

      - name: Setup HOME and PATH
        run: |
          echo "HOME=/home/ubuntu" >> $GITHUB_ENV
          echo "PATH=/home/ubuntu/bin:$PATH" >> $GITHUB_ENV

      - name: Configure git
        run: |
          git config --global user.name "Actions bot"
          git config --global user.email "none@none"

      - name: Get submodules
        run: |
          git submodule init
          git submodule update

      - run: |
          ./try-rebase.sh
          if ! git diff --quiet; then
            echo MOVED=1 >>$GITHUB_ENV
          else
            echo MOVED=0 >>$GITHUB_ENV
          fi

      - name: Test the build
        if: ${{ env.MOVED == '1' }}
        run: |
          eval $(opam env)
          make -skj$(nproc) ci
          make -skj$(nproc) dist
          # Did something change?
          git add dist # must rest!
          if ! git diff --quiet --cached dist; then
            echo DISTCHANGE=1 >>$GITHUB_ENV
          else
            echo DISTCHANGE=0 >>$GITHUB_ENV
          fi
          git reset

      - name: Push updated state, since there's no diff
        if: ${{ env.MOVED == '1' && env.DISTCHANGE == '0' }}
        run: |
          # Use the token so we can push to these repos.
          for dir in FStar karamel pulse; do
            pushd $dir
            echo "in $(pwd)"
            R=$(git remote get-url origin | grep -Eo '[[:alnum:]]*/[[:alnum:]]*$')
            echo R=$R
            echo before
            git remote -v
            git remote set-url origin https://${{secrets.ADVANCE_GH_TOKEN}}@github.com/$R
            echo after
            git remote -v
            popd
          done
          ./try-push.sh

      - name: Make a PR! There's a diff to review.
        if: ${{ env.MOVED == '1' && env.DISTCHANGE == '1' }}
        run: |
          git status
          git diff
          # TODO, just fail for now.
          exit 1
          # git add . && git commit -m "Bump modules (dist changed)."
          # gh pr create
