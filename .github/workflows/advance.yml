name: Advance submodules

# This workflow uses KUIPER_ADVANCE_GH_TOKEN (a fine-grained PAT) to push
# to the FStar and karamel submodule repos. To renew/recreate the token:
#
# 1. Go to https://github.com/settings/personal-access-tokens/new
# 2. Set resource owner to "FStarLang"
# 3. Under "Repository access", select "FStarLang/FStar" and "FStarLang/karamel"
# 4. Under "Permissions > Repository permissions > Contents", set to "Read and write"
# 5. Generate the token
# 6. Update the secret at: https://github.com/FStarLang/kuiper/settings/secrets/actions
#    (secret name: KUIPER_ADVANCE_GH_TOKEN)

on:
  # Manually triggered
  workflow_dispatch:
  schedule:
    # Or once a day
    - cron: '0 0 * * *'

# When updating this tag, also update .devcontainer/devcontainer.json
# and ci.yml.
jobs:
  build:
    runs-on: [self-hosted, linux, X64, cuda]
    container:
      image: mtzguido/pulse-cuda-devcontainer:latest
      options: --gpus all
    defaults:
      run:
        shell: bash
    steps:
      - run: find . -delete
      - name: Check out repo
        uses: actions/checkout@v6

      - run: sudo apt-get install -y indent

      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update && sudo apt-get install -y gh

      - name: Setup HOME and PATH
        run: |
          echo "HOME=/home/vscode" >> $GITHUB_ENV
          echo "PATH=/home/vscode/bin:$PATH" >> $GITHUB_ENV

      - name: Configure git
        run: |
          git config --global user.name "Actions bot"
          git config --global user.email "none@none"

      # This step is optional. It's here to remind us how to update the token,
      # since sadly they expire every year (just long enough to fully forget
      # how it's done!)
      - name: Validate KUIPER_ADVANCE_GH_TOKEN
        env:
          TOKEN: ${{ secrets.KUIPER_ADVANCE_GH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::KUIPER_ADVANCE_GH_TOKEN secret is not set. See instructions at the top of this workflow file."
            exit 1
          fi
          for repo in FStarLang/FStar FStarLang/karamel; do
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.github.com/repos/$repo/collaborators")
            if [ "$status" = "401" ] || [ "$status" = "403" ]; then
              echo "::error::KUIPER_ADVANCE_GH_TOKEN lacks push access to $repo (HTTP $status). The token may be expired. See instructions at the top of this workflow file to renew it."
              exit 1
            fi
          done

      - name: Get submodules
        run: |
          git submodule update --init --recursive

      - run: |
          ./try-rebase.sh
          if ! git diff --quiet; then
            echo MOVED=1 >>$GITHUB_ENV
          else
            echo MOVED=0 >>$GITHUB_ENV
          fi

      - name: Test the build
        if: ${{ env.MOVED == '1' }}
        run: |
          eval $(opam env)
          make -skj$(nproc) ci
          make -skj$(nproc) dist
          # Did something change?
          git add dist # must rest!
          git reset dist/BUILD_INFO # ignore build info changes
          if ! git diff --quiet --cached dist; then
            echo DISTCHANGE=1 >>$GITHUB_ENV
            git add dist/BUILD_INFO # but commit them if we're updating...
          else
            echo DISTCHANGE=0 >>$GITHUB_ENV
          fi
          git reset

      - name: Push updated state, since there's no diff
        if: ${{ env.MOVED == '1' && env.DISTCHANGE == '0' }}
        run: |
          # Use the token so we can push to these repos.
          for dir in FStar karamel; do
            pushd $dir
            echo "in $(pwd)"
            R=$(git remote get-url origin | grep -Eo '[[:alnum:]]*/[[:alnum:]]*$')
            echo R=$R
            echo before
            git remote -v
            git remote set-url origin https://${{secrets.KUIPER_ADVANCE_GH_TOKEN}}@github.com/$R
            echo after
            git remote -v
            popd
          done
          ./try-push.sh

      - name: Push submodule commits to remotes and open PR
        if: ${{ env.MOVED == '1' && env.DISTCHANGE == '1' }}
        env:
          GH_TOKEN: ${{ secrets.KUIPER_ADVANCE_GH_TOKEN }}
        run: |
          # Push submodule commits so the SHAs are reachable when the PR is merged.
          for dir in FStar karamel; do
            pushd $dir
            R=$(git remote get-url origin | grep -Eo '[[:alnum:]]*/[[:alnum:]]*$')
            git remote set-url origin https://${{ secrets.KUIPER_ADVANCE_GH_TOKEN }}@github.com/$R
            git push -f origin HEAD:refs/heads/_kuiper
            popd
          done

          # Create a branch with the submodule bump + dist changes.
          BRANCH=advance/dist-update
          git checkout -b "$BRANCH"
          git add .
          git commit -m "Bump submodules (dist changed)"
          git push -f origin "$BRANCH"

          # Create a new PR or update the existing one.
          existing_pr=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing_pr" ]; then
            echo "Updated existing PR #$existing_pr"
          else
            gh pr create \
              --title "Advance submodules (dist changed)" \
              --body "Automated submodule advance detected changes in \`dist/\`. Please review."
          fi
